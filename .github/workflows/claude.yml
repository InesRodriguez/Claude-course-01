name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Project Setup
        run: |
          npm run setup
          npm run dev:daemon

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          custom_instructions: |
            The project is already set up with all dependencies installed.
            The server is already running at localhost:3000. Logs from it
            are being written to logs.txt. If needed, you can query the
            db with the 'sqlite3' cli. If needed, use the mcp_playwright
            set of tools to launch a browser and interact with the app.

          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@latest",
                    "--allowed-origins",
                    "http://localhost:3000;https://cdn.tailwindcss.com;https://esm.sh",
                    "--caps",
                    "vision,pdf,devtools"
                  ]
                }
              }
            }
          claude_args: >-
            --allowed-tools
            Bash(npm:*),Bash(sqlite3:*),mcp__playwright__browser_annotate,mcp__playwright__browser_click,mcp__playwright__browser_close,mcp__playwright__browser_console_messages,mcp__playwright__browser_cookie_clear,mcp__playwright__browser_cookie_delete,mcp__playwright__browser_cookie_get,mcp__playwright__browser_cookie_list,mcp__playwright__browser_cookie_set,mcp__playwright__browser_drag,mcp__playwright__browser_drop,mcp__playwright__browser_evaluate,mcp__playwright__browser_file_upload,mcp__playwright__browser_fill_form,mcp__playwright__browser_generate_locator,mcp__playwright__browser_get_config,mcp__playwright__browser_handle_dialog,mcp__playwright__browser_hide_highlight,mcp__playwright__browser_highlight,mcp__playwright__browser_hover,mcp__playwright__browser_localstorage_clear,mcp__playwright__browser_localstorage_delete,mcp__playwright__browser_localstorage_get,mcp__playwright__browser_localstorage_list,mcp__playwright__browser_localstorage_set,mcp__playwright__browser_mouse_click_xy,mcp__playwright__browser_mouse_down,mcp__playwright__browser_mouse_drag_xy,mcp__playwright__browser_mouse_move_xy,mcp__playwright__browser_mouse_up,mcp__playwright__browser_mouse_wheel,mcp__playwright__browser_navigate,mcp__playwright__browser_navigate_back,mcp__playwright__browser_network_request,mcp__playwright__browser_network_requests,mcp__playwright__browser_network_state_set,mcp__playwright__browser_pdf_save,mcp__playwright__browser_press_key,mcp__playwright__browser_resize,mcp__playwright__browser_resume,mcp__playwright__browser_route,mcp__playwright__browser_route_list,mcp__playwright__browser_run_code_unsafe,mcp__playwright__browser_select_option,mcp__playwright__browser_sessionstorage_clear,mcp__playwright__browser_sessionstorage_delete,mcp__playwright__browser_sessionstorage_get,mcp__playwright__browser_sessionstorage_list,mcp__playwright__browser_sessionstorage_set,mcp__playwright__browser_set_storage_state,mcp__playwright__browser_snapshot,mcp__playwright__browser_start_tracing,mcp__playwright__browser_start_video,mcp__playwright__browser_stop_tracing,mcp__playwright__browser_stop_video,mcp__playwright__browser_storage_state,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_tabs,mcp__playwright__browser_type,mcp__playwright__browser_unroute,mcp__playwright__browser_verify_element_visible,mcp__playwright__browser_verify_list_visible,mcp__playwright__browser_verify_text_visible,mcp__playwright__browser_verify_value,mcp__playwright__browser_video_chapter,mcp__playwright__browser_wait_for

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: extend claude_args (e.g. '--allowed-tools Bash(gh pr:*)') — merge with the value above if needed
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

